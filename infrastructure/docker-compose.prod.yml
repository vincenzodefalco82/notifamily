# =============================================================
# Notifamily — Docker Compose PRODUZIONE (Hetzner VPS)
# Usa la rete Traefik già attiva da Medigest
# =============================================================

name: notifamily-prod

services:
  web:
    image: ghcr.io/vincenzodefalco82/notifamily:latest
    restart: always
    labels:
      - "traefik.enable=true"
      # HTTPS router — notifamily.com e www.notifamily.com
      - "traefik.http.routers.notifamily.rule=Host(`notifamily.com`) || Host(`www.notifamily.com`)"
      - "traefik.http.routers.notifamily.entrypoints=websecure"
      - "traefik.http.routers.notifamily.tls.certresolver=letsencrypt"
      - "traefik.http.services.notifamily.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: medigest-prod_default
