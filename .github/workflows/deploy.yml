name: Deploy — Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push web (nginx)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: VITE_API_URL=https://api.notifamily.com
          tags: ghcr.io/vincenzodefalco82/notifamily-web:latest

      - name: Build e push API
        uses: docker/build-push-action@v5
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: ghcr.io/vincenzodefalco82/notifamily-api:latest

      - name: Deploy su Hetzner VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 15m
          script: |
            REPO_URL="https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/vincenzodefalco82/notifamily.git"

            if [ ! -d /opt/notifamily/.git ]; then
              rm -rf /opt/notifamily
              git clone "$REPO_URL" /opt/notifamily
            fi

            cd /opt/notifamily
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f /opt/notifamily/.env ]; then
              echo "JWT_SECRET=$(openssl rand -hex 32)" > /opt/notifamily/.env
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose --env-file /opt/notifamily/.env -f /opt/notifamily/infrastructure/docker-compose.prod.yml pull
            docker compose --env-file /opt/notifamily/.env -f /opt/notifamily/infrastructure/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            echo "=== Deploy OK: $(date) ==="
            docker compose --env-file /opt/notifamily/.env -f /opt/notifamily/infrastructure/docker-compose.prod.yml ps
